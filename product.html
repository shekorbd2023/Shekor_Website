<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>শেকড় — পণ্যের বিবরণ</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--g:#1A3A1F;--g2:#2D5C34;--g3:#4A8C52;--gold:#D4A940;--gold2:#E8C050;--cream:#F5F2EB;--cream2:#EAE4D5;--brown:#3B1F0A;--w:#FEFFFE;--t:#1A2B1A;--t2:#3A4E3A;--t3:#6B826B;}
*{margin:0;padding:0;box-sizing:border-box;}html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--t);}
/* NAV */
nav{background:var(--w);box-shadow:0 2px 20px rgba(0,0,0,.08);position:sticky;top:0;z-index:1000;padding:0 5%;}
.ni{display:flex;align-items:center;justify-content:space-between;height:68px;}
.nl{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nl img{width:46px;height:46px;border-radius:50%;object-fit:cover;}
.nbn{font-family:'Hind Siliguri',sans-serif;font-size:1.25rem;font-weight:700;color:var(--g);}
.nen{font-size:.6rem;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;}
.nr{display:flex;align-items:center;gap:.8rem;}
.icb{background:none;border:none;cursor:pointer;padding:.4rem;border-radius:6px;font-size:1.1rem;color:var(--t2);position:relative;}
.cb{position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--g);width:18px;height:18px;border-radius:50%;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--t2);text-decoration:none;font-size:.88rem;font-family:'Hind Siliguri',sans-serif;transition:color .25s;}
.back-btn:hover{color:var(--g);}
/* BREADCRUMB */
.breadcrumb{padding:1rem 5%;background:var(--w);border-bottom:1px solid var(--cream2);}
.breadcrumb span{font-size:.8rem;color:var(--t3);font-family:'Hind Siliguri',sans-serif;}
.breadcrumb a{color:var(--g);text-decoration:none;font-size:.8rem;}
.breadcrumb span.sep{margin:0 .4rem;}
/* PRODUCT DETAIL */
.product-page{max-width:1150px;margin:0 auto;padding:2.5rem 5%;}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:3.5rem;align-items:start;margin-bottom:3rem;}
/* IMAGE SECTION */
.img-section{}
.main-img{width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:linear-gradient(145deg,#E8F5E8,var(--cream2));display:flex;align-items:center;justify-content:center;font-size:8rem;margin-bottom:1rem;position:relative;}
.main-img img{width:100%;height:100%;object-fit:cover;}
.img-badge{position:absolute;top:16px;left:16px;background:var(--g);color:var(--gold);font-size:.75rem;font-weight:700;padding:5px 14px;border-radius:20px;letter-spacing:.08em;}
.img-thumbs{display:flex;gap:.6rem;}
.thumb{width:70px;height:70px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:all .25s;}
.thumb.active,.thumb:hover{border-color:var(--g);}
.thumb img{width:100%;height:100%;object-fit:cover;}
/* INFO SECTION */
.info-section{}
.p-category{font-size:.72rem;text-transform:uppercase;letter-spacing:.15em;color:var(--g3);margin-bottom:.5rem;font-family:'DM Sans',sans-serif;}
.p-name{font-family:'Hind Siliguri',sans-serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;color:var(--t);line-height:1.2;margin-bottom:.8rem;}
.p-rating{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;}
.stars{color:#F4A015;font-size:.9rem;}
.rating-num{font-size:.85rem;color:var(--t2);font-weight:600;}
.review-count{font-size:.8rem;color:var(--t3);}
.p-desc{font-family:'Hind Siliguri',sans-serif;font-size:1rem;line-height:1.9;color:var(--t2);margin-bottom:1.5rem;}
/* SIZE SELECTOR */
.size-label{font-family:'Hind Siliguri',sans-serif;font-size:.85rem;font-weight:600;color:var(--t);margin-bottom:.6rem;}
.sizes{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.sz-btn{padding:.5rem 1.1rem;border-radius:8px;border:2px solid var(--cream2);background:var(--w);font-family:'Hind Siliguri',sans-serif;font-size:.88rem;cursor:pointer;transition:all .25s;color:var(--t2);}
.sz-btn.active,.sz-btn:hover{border-color:var(--g);background:var(--g);color:white;}
/* PRICE */
.price-box{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1.5rem;}
.price-main{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:600;color:var(--g);}
.price-old{font-size:1rem;color:var(--t3);text-decoration:line-through;}
.price-save{background:#E8F5E9;color:#2E7D32;font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:20px;}
/* ADD TO CART */
.cart-actions{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.qty-wrap{display:flex;align-items:center;gap:0;border:2px solid var(--cream2);border-radius:10px;overflow:hidden;}
.qty-btn{width:40px;height:48px;border:none;background:var(--cream);cursor:pointer;font-size:1.1rem;transition:background .2s;}
.qty-btn:hover{background:var(--cream2);}
.qty-num{width:50px;height:48px;text-align:center;border:none;font-size:1rem;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--w);color:var(--t);}
.add-cart-btn{flex:1;background:var(--g);color:white;border:none;padding:.9rem 1.5rem;border-radius:10px;font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.add-cart-btn:hover{background:var(--g2);transform:translateY(-1px);}
.order-now-btn{width:100%;background:var(--gold);color:var(--g);border:none;padding:.9rem;border-radius:10px;font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:all .3s;margin-bottom:1rem;}
.order-now-btn:hover{background:var(--gold2);}
/* HIGHLIGHTS */
.highlights{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.5rem;}
.hl{display:flex;align-items:center;gap:8px;background:var(--cream);border-radius:8px;padding:.7rem;}
.hl-ic{font-size:1.1rem;}
.hl-txt{font-family:'Hind Siliguri',sans-serif;font-size:.8rem;color:var(--t2);}
/* TABS */
.tabs-wrap{margin-top:3rem;}
.tab-btns{display:flex;gap:0;border-bottom:2px solid var(--cream2);margin-bottom:1.5rem;}
.tab-btn{padding:.75rem 1.5rem;border:none;background:transparent;font-family:'Hind Siliguri',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .25s;}
.tab-btn.active{color:var(--g);border-bottom-color:var(--g);}
.tab-content{display:none;}.tab-content.active{display:block;}
/* DETAILS TABLE */
.details-table{width:100%;border-collapse:collapse;}
.details-table tr{border-bottom:1px solid var(--cream);}
.details-table td{padding:.9rem 1rem;font-size:.9rem;}
.details-table td:first-child{color:var(--t3);width:40%;font-family:'Hind Siliguri',sans-serif;}
.details-table td:last-child{color:var(--t);font-weight:500;font-family:'Hind Siliguri',sans-serif;}
/* ORIGIN */
.origin-box{background:var(--g);border-radius:16px;padding:2rem;color:white;margin-bottom:1.5rem;}
.origin-box h3{font-family:'Hind Siliguri',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:1rem;color:var(--gold);}
.origin-box p{font-family:'Hind Siliguri',sans-serif;font-size:.92rem;line-height:1.9;color:rgba(255,255,255,.8);}
.origin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.2rem;}
.os{text-align:center;background:rgba(255,255,255,.08);border-radius:10px;padding:1rem;}
.os h4{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);}
.os p{font-size:.75rem;color:rgba(255,255,255,.6);margin-top:2px;}
/* NUTRITION */
.nutrition-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem;}
.nut-card{background:var(--cream);border-radius:10px;padding:1rem;text-align:center;}
.nut-val{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:600;color:var(--g);}
.nut-name{font-size:.72rem;color:var(--t3);margin-top:3px;font-family:'DM Sans',sans-serif;}
/* REVIEWS */
.review-summary{display:flex;align-items:center;gap:2rem;background:var(--cream);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;}
.rs-big{text-align:center;}
.rs-num{font-family:'Playfair Display',serif;font-size:3rem;font-weight:600;color:var(--g);}
.rs-stars{color:#F4A015;font-size:1.1rem;}
.rs-count{font-size:.78rem;color:var(--t3);margin-top:3px;}
.review-bars{flex:1;}
.rb{display:flex;align-items:center;gap:.8rem;margin-bottom:.4rem;}
.rb-label{font-size:.78rem;color:var(--t2);width:30px;flex-shrink:0;}
.rb-bar{flex:1;height:6px;background:var(--cream2);border-radius:3px;overflow:hidden;}
.rb-fill{height:100%;background:var(--gold);border-radius:3px;}
.rb-count{font-size:.75rem;color:var(--t3);width:25px;text-align:right;}
.review-card{background:var(--w);border-radius:12px;padding:1.3rem;margin-bottom:.8rem;border:1px solid var(--cream);}
.rc-head{display:flex;align-items:center;gap:10px;margin-bottom:.7rem;}
.rc-av{width:40px;height:40px;border-radius:50%;background:var(--g);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:600;}
.rc-name{font-family:'Hind Siliguri',sans-serif;font-size:.9rem;font-weight:600;}
.rc-date{font-size:.75rem;color:var(--t3);}
.rc-stars{color:#F4A015;font-size:.75rem;margin-bottom:.5rem;}
.rc-text{font-family:'Hind Siliguri',sans-serif;font-size:.9rem;color:var(--t2);line-height:1.75;}
/* RELATED */
.related{padding:3rem 5%;background:var(--w);}
.related h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--t);margin-bottom:1.5rem;}
.rel-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem;}
.rel-card{background:var(--cream);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .3s;}
.rel-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(26,58,31,.1);}
.rel-img{width:100%;aspect-ratio:1;overflow:hidden;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:3rem;}
.rel-img img{width:100%;height:100%;object-fit:cover;}
.rel-info{padding:.9rem;}
.rel-name{font-family:'Hind Siliguri',sans-serif;font-size:.88rem;font-weight:600;color:var(--t);margin-bottom:.3rem;}
.rel-price{font-family:'Playfair Display',serif;font-size:1rem;color:var(--g);}
/* CART DRAWER */
.cov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;}
.cov.op{display:block;}
.cdr{position:fixed;right:0;top:0;bottom:0;width:360px;background:white;z-index:2001;transform:translateX(100%);transition:transform .35s;display:flex;flex-direction:column;}
.cdr.op{transform:translateX(0);}
.cdh{padding:1.2rem 1.5rem;border-bottom:1px solid var(--cream2);display:flex;justify-content:space-between;align-items:center;}
.cdh h3{font-family:'Hind Siliguri',sans-serif;font-size:1.1rem;font-weight:700;color:var(--g);}
.cdc{background:none;border:none;font-size:1.3rem;cursor:pointer;}
.cdit{flex:1;overflow-y:auto;padding:1rem 1.5rem;}
.cdem{text-align:center;padding:3rem 1rem;color:var(--t3);font-family:'Hind Siliguri',sans-serif;}
.ci{display:flex;gap:12px;padding:1rem 0;border-bottom:1px solid var(--cream);align-items:center;}
.cii{width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--cream2);}
.cii img{width:100%;height:100%;object-fit:cover;}
.cin{font-family:'Hind Siliguri',sans-serif;font-size:.88rem;font-weight:600;}
.cisz{font-size:.72rem;color:var(--t3);}
.cip{font-size:.85rem;color:var(--g);font-weight:600;}
.ciq{display:flex;align-items:center;gap:6px;margin-top:5px;}
.qb{width:22px;height:22px;border-radius:50%;border:1px solid var(--cream2);background:var(--cream);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.qb:hover{background:var(--g);color:white;}
.qn{font-size:.85rem;font-weight:600;min-width:18px;text-align:center;}
.cdl{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.82rem;}
.cdf{padding:1.2rem 1.5rem;border-top:1px solid var(--cream2);}
.cdt{display:flex;justify-content:space-between;margin-bottom:1rem;}
.cdt span{font-family:'Hind Siliguri',sans-serif;font-size:.95rem;}
.cdt strong{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--g);}
.cck{width:100%;background:var(--g);color:white;border:none;padding:.95rem;border-radius:25px;font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;}
.tst{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--g);color:white;padding:.8rem 1.5rem;border-radius:25px;font-family:'Hind Siliguri',sans-serif;font-size:.9rem;z-index:9999;white-space:nowrap;animation:ti .3s ease;}
@keyframes ti{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
@media(max-width:900px){.product-grid{grid-template-columns:1fr;}.highlights{grid-template-columns:1fr;}.nutrition-grid{grid-template-columns:repeat(3,1fr);}.rel-grid{grid-template-columns:1fr 1fr;}.origin-stats{grid-template-columns:1fr 1fr;}.cdr{width:100%;}}
@media(max-width:600px){.cart-actions{flex-direction:column;}.rel-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

// ── CART ──
let cart = JSON.parse(localStorage.getItem('sCart') || '[]');
let currentProduct = null;
let selectedSize = null;
let qty = 1;

function stars(r){ return '★'.repeat(Math.round(r)) + '☆'.repeat(5-Math.round(r)); }

// ── LOAD PRODUCT FROM URL ──
function loadProduct(){
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const p = PRODUCTS.find(x => x.id === id);
  if(!p){ window.location.href = 'index.html'; return; }
  currentProduct = p;
  selectedSize = p.sizes[1] || p.sizes[0];

  // Update page title
  document.title = p.name + ' — শেকড়';

  // Breadcrumb
  document.getElementById('bc-cat').textContent = p.catName;
  document.getElementById('bc-name').textContent = p.name;

  // Badge
  document.getElementById('pBadge').textContent = p.badge;

  // Image
  if(p.img){
    document.getElementById('mainEmoji').style.display = 'none';
    const img = document.getElementById('mainImgEl');
    img.src = p.img; img.alt = p.name; img.style.display = 'block';
    img.onerror = function(){ this.style.display='none'; document.getElementById('mainEmoji').style.display='block'; };
  } else {
    document.getElementById('mainEmoji').textContent = p.em;
  }

  // Info
  document.getElementById('pCat').textContent = p.catName;
  document.getElementById('pName').textContent = p.name;
  document.getElementById('pStars').textContent = stars(p.rat);
  document.getElementById('pRating').textContent = p.rat;
  document.getElementById('pReviews').textContent = '(' + p.rv + ' রিভিউ)';
  document.getElementById('pDesc').textContent = p.desc;

  // Sizes
  const sizesEl = document.getElementById('pSizes');
  sizesEl.innerHTML = p.sizes.map((s,i) => `
    <button class="sz-btn ${i===1||p.sizes.length===1?'active':''}" onclick="selectSize(${i},this)">
      ${s.s}<br/><small style="font-size:.75rem">৳${s.p}</small>
    </button>`).join('');

  updatePrice();

  // Highlights
  document.getElementById('pHighlights').innerHTML = (p.highlights||[]).map(h =>
    `<div class="hl"><span class="hl-ic">✅</span><span class="hl-txt">${h}</span></div>`).join('');

  // Details tab
  document.getElementById('detailsTable').innerHTML = Object.entries(p.details||{}).map(([k,v]) =>
    `<tr><td>${k}</td><td>${v}</td></tr>`).join('');

  // Origin tab
  const o = p.origin || {};
  document.getElementById('originBox').innerHTML = `
    <h3>🌿 ${o.title||'উৎস'}</h3>
    <p>${o.desc||''}</p>
    <div class="origin-stats">${(o.stats||[]).map(s=>
      `<div class="os"><h4>${s.v}</h4><p>${s.l}</p></div>`).join('')}
    </div>`;

  // Nutrition tab
  document.getElementById('nutritionGrid').innerHTML = (p.nutrition||[]).map(n =>
    `<div class="nut-card"><div class="nut-val">${n.v}</div><div class="nut-name">${n.l}</div></div>`).join('');

  // Reviews tab
  const reviews = p.reviews || [];
  const avgRating = p.rat;
  document.getElementById('reviewSummary').innerHTML = `
    <div class="rs-big">
      <div class="rs-num">${avgRating}</div>
      <div class="rs-stars">${stars(avgRating)}</div>
      <div class="rs-count">${p.rv} রিভিউ</div>
    </div>
    <div class="review-bars">
      ${[5,4,3,2,1].map(n => `<div class="rb"><span class="rb-label">${n}★</span><div class="rb-bar"><div class="rb-fill" style="width:${n===5?80:n===4?15:5}%"></div></div><span class="rb-count">${n===5?Math.round(p.rv*.8):n===4?Math.round(p.rv*.15):Math.round(p.rv*.05)}</span></div>`).join('')}
    </div>`;

  document.getElementById('reviewList').innerHTML = reviews.map(r => `
    <div class="review-card">
      <div class="rc-head">
        <div class="rc-av">${r.name[0]}</div>
        <div><div class="rc-name">${r.name}</div><div class="rc-date">${r.loc} · ${r.date}</div></div>
      </div>
      <div class="rc-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
      <div class="rc-text">${r.text}</div>
    </div>`).join('');

  // Related products
  const related = PRODUCTS.filter(x => x.cat === p.cat && x.id !== p.id).slice(0,4);
  document.getElementById('relGrid').innerHTML = related.map(r => `
    <div class="rel-card" onclick="location.href='product.html?id=${r.id}'">
      <div class="rel-img">${r.img?`<img src="${r.img}" alt="${r.name}" onerror="this.parentElement.innerHTML='${r.em}'"/>`:r.em}</div>
      <div class="rel-info">
        <div class="rel-name">${r.name}</div>
        <div class="rel-price">৳${r.sizes[0].p}+</div>
      </div>
    </div>`).join('');
}

function selectSize(i, btn){
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedSize = currentProduct.sizes[i];
  updatePrice();
}

function updatePrice(){
  if(!selectedSize) return;
  document.getElementById('pPrice').textContent = '৳' + selectedSize.p;
}

function changeQty(d){
  qty = Math.max(1, Math.min(50, qty + d));
  document.getElementById('qtyInput').value = qty;
}

function addToCart(){
  if(!currentProduct || !selectedSize) return;
  const key = currentProduct.id + '-' + selectedSize.s;
  const ex = cart.find(x => x.key === key);
  if(ex) ex.qty += qty;
  else cart.push({key, id:currentProduct.id, name:currentProduct.name, sz:selectedSize.s, price:selectedSize.p, img:currentProduct.img||'', em:currentProduct.em, qty});
  saveCart(); updateBadge(); renderCart(); openCart();
  toast('✓ ' + currentProduct.name + ' কার্টে যোগ হয়েছে!');
}

function orderNow(){
  addToCart();
  setTimeout(() => { window.location.href = 'checkout.html'; }, 500);
}

function removeCart(k){ cart=cart.filter(x=>x.key!==k); saveCart();updateBadge();renderCart(); }
function changeCartQty(k,d){ const i=cart.find(x=>x.key===k); if(i){i.qty+=d;if(i.qty<=0)cart=cart.filter(x=>x.key!==k);} saveCart();updateBadge();renderCart(); }
function saveCart(){ localStorage.setItem('sCart',JSON.stringify(cart)); }
function updateBadge(){ document.getElementById('cb').textContent=cart.reduce((s,x)=>s+x.qty,0); }

function renderCart(){
  const el=document.getElementById('cdit');
  const tot=cart.reduce((s,x)=>s+x.price*x.qty,0);
  document.getElementById('cdt').textContent='৳'+tot;
  if(!cart.length){el.innerHTML='<div class="cdem"><p style="font-size:2rem">🛒</p><p>কার্ট খালি</p></div>';return;}
  el.innerHTML=cart.map(x=>`<div class="ci">
    <div class="cii">${x.img?`<img src="${x.img}" alt="${x.name}" onerror="this.parentElement.innerHTML='${x.em||'🌿'}'"/>`:(x.em||'🌿')}</div>
    <div style="flex:1"><div class="cin">${x.name}</div><div class="cisz">${x.sz}</div><div class="cip">৳${x.price}</div>
    <div class="ciq"><button class="qb" onclick="changeCartQty('${x.key}',-1)">−</button><span class="qn">${x.qty}</span><button class="qb" onclick="changeCartQty('${x.key}',1)">+</button><button class="cdl" onclick="removeCart('${x.key}')">🗑</button></div></div>
    <strong style="color:var(--g)">৳${x.price*x.qty}</strong></div>`).join('');
}

function openCart(){ document.getElementById('cdr').classList.add('op'); document.getElementById('cov').classList.add('op'); }
function closeCart(){ document.getElementById('cdr').classList.remove('op'); document.getElementById('cov').classList.remove('op'); }
function showTab(id, btn){ document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); btn.classList.add('active'); }
function toast(m){ const d=document.createElement('div');d.className='tst';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2500); }

loadProduct(); updateBadge(); renderCart();
</script>
</body>
</html>
